# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy: WebSearch each portal with a site: filter and role keywords.
# Results are filtered through title_filter (positive AND negative) before
# being surfaced.
#
# CHANGELOG (2026-04):
#   - Removed legacy ATS-portal queries (Ashby / Lever / Indeed / Glassdoor
#     / ZipRecruiter / Wellfound / Workable / Boolean blocks).
#   - GREENHOUSE EXCLUDED from all scan and apply workflows. Any company
#     using greenhouse.io must be applied to manually.
#   - Restored tracked_companies (70+ companies) covering Ashby, Lever,
#     Workable, and direct careers pages. Greenhouse-only companies omitted.
#   - 50 job board search queries retained for broad discovery (Level 3).

# ═══════════════════════════════════════════════════════════════════════════════
# TRACKED COMPANIES — Level 1 (Playwright direct scan, highest priority)
# These are scanned by navigating directly to the company's careers page.
# Greenhouse URLs are intentionally excluded — apply manually for those.
# ═══════════════════════════════════════════════════════════════════════════════

