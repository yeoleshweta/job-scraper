# CONFLICT NOTES — read before running:
#   1. Portals #42 CryptoJobs and #43 Web3Jobs are in the list, but
#      title_filter.negative contains "Crypto", "Web3", and "Blockchain".
#      Every result from those two boards will be filtered OUT. Either
#      drop those negatives or set enabled: false on #42 and #43.
#   2. #9 Remotive and #45 Remotive.io are almost certainly the same
#      product (remotive.com / remotive.io). Disable one to dedupe.
#   3. URLs marked `# TODO: verify` are best-guess domains for less common
#      boards — confirm before relying on the scan.

# -- Company size filter --
# Controls which company sizes are scanned. Values: startup, mid, large
#   startup = < ~500 employees (seed to Series B/C)
#   mid     = ~500–5000 employees (growth-stage, scaling)
#   large   = 5000+ employees (established, big tech, public)
# Set to [startup, mid, large] to scan all companies regardless of size.
# Override at runtime with: node auto-apply.mjs --size startup,mid

company_size_filter:
  include: [startup, mid, large]

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # UX Research (primary target)
    - "UX Researcher"
    - "User Researcher"
    - "UX Research"
    - "User Research"
    - "Usability Researcher"
    - "Human Factors"
    - "Research Scientist"
    - "Mixed Methods"
    # Data Science / NLP / AI (secondary target)
    - "Data Scientist"
    - "NLP"
    - "Natural Language"
    - "Behavioral Analytics"
    - "Research Data Scientist"
    # Data Analyst (added target)
    - "Data Analyst"
    - "Analytics Analyst"
    - "Research Analyst"
    - "Business Intelligence Analyst"
    - "BI Analyst"
    - "Product Analyst"
    - "Insights Analyst"
    - "Clinical Data Analyst"
    - "Healthcare Data Analyst"
    # UX Design (adjacent)
    - "UX Designer"
    - "Product Designer"
    - "Interaction Designer"
    - "Experience Designer"
    # Broader research & insights
    - "Insights"
    - "Customer Insights"
    - "Research Ops"
    - "ResearchOps"
    - "AI Researcher"
    - "Applied Researcher"

  negative:
    - "Junior"
    - "Intern"
    - "iOS"
    - "Android"
    - "Embedded"
    - "Firmware"
    - "Blockchain" # conflicts with #42 / #43 — see CONFLICT NOTES
    - "Web3" # conflicts with #43       — see CONFLICT NOTES
    - "Crypto" # conflicts with #42       — see CONFLICT NOTES
    - "COBOL"
    - "Mainframe"
    - "Sales"
    - "Marketing"
    - "SEO"

  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

# -- Search queries --
# 50 job portals from saved bookmarks. Order preserved from source list.
# Each entry runs ONE WebSearch with the listed query.
# Toggle individual portals via enabled: true/false.

search_queries:
