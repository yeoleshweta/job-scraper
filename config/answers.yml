# ── Work authorization ────────────────────────────────────────────
authorization:
  authorized:           true         # legally authorized to work in US?
  authorization_type:   "F-1 OPT"   # visa/status type
  requires_sponsorship: false        # need sponsorship now?
  will_require_future:  false        # will need sponsorship in future?
