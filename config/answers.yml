# ── Standard question answers ─────────────────────────────────────
# These are used for free-text fields that appear on most applications.
standard_answers:

  about: >
    I'm a UX Researcher with 7+ years combining qualitative and quantitative
    methods, healthcare AI, and behavioral analytics. I built the research
    function at John Deere India from scratch, led NLP-based behavioral
    research at ABIM, and am completing my MS in AI & Machine Learning at
    Drexel (2026). I work fluidly across user interviews, usability testing,
    survey design, A/B experimentation, and NLP-assisted analysis.

  why_ux_research: >
    I'm drawn to roles where research directly shapes product direction —
    where my work moves from insight to decision to measurable outcome.
    My background spans clinical AI (ABIM), enterprise SaaS (John Deere),
    and consumer wellness (UrbanFit), giving me a cross-domain perspective
    that I bring to every research question.

  greatest_strength: >
    Bridging qualitative depth with quantitative rigor. I can run a
    longitudinal diary study one week and build a behavioral analytics
    dashboard the next — and connect both to a single product decision.

  biggest_challenge: >
    At John Deere, I had to build research credibility with 6 product
    teams that had never worked with a dedicated researcher. I created the
    PM-UX Playbook — a shared framework for research integration — which
    increased PM UX literacy by 80% and made research a default part of
    every sprint cycle.

  why_remote: >
    I've worked effectively in distributed teams across time zones at John
    Deere (US/India) and ABIM. I default to async-first communication,
    structured documentation, and proactive stakeholder updates.

  diversity_statement: >
    As a first-generation immigrant researcher from India working in
    healthcare AI, I bring lived experience with underrepresented
    perspectives that consistently shapes how I frame research questions
    and interpret findings — especially in studies involving diverse
    patient or user populations.

  additional_info: >
    I built this application workflow using Playwright automation and
    custom AI tooling — the same kind of systems thinking I bring to
    research infrastructure. Portfolio: shwetasharma.tech

